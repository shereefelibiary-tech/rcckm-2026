name: RCCKM validation

on:
  push:
  pull_request:

jobs:
  validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest streamlit pandas
      - name: Pytest
        run: python -m pytest
      - name: Fuzz validation sample
        run: python -m tools.fuzz_rcckm --n 1000 --seed 2026
