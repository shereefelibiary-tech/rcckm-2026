name: RCCKM validation

on:
  push:
  pull_request:

jobs:
  validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest streamlit pandas
      - name: Golden cases
        run: python -m pytest tests/golden_cases
      - name: Never-cross invariants
        run: python -m pytest tests/invariants
      - name: Snapshot contracts
        run: python -m pytest tests/snapshots
      - name: Layered validation runner
        run: python tools/run_validation.py
